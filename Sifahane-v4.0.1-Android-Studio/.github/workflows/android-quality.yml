name: Android quality gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Verify wrapper bootstrap checksum
        run: echo "a5b88f1f29155cfcb3c9208780beea7ceab5fb84f8e721e7f8127b98d6eb3f78  gradle/wrapper/gradle-wrapper.jar" | sha256sum --check --strict
      - name: Source quality gate
        run: python3 tools/source_quality_gate.py
      - name: Unit tests, lint and reproducible builds
        env:
          SOURCE_DATE_EPOCH: '0'
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon testDebugUnitTest lintDebug kspDebugKotlin assembleDebug assembleRelease assembleDebugAndroidTest
      - name: Release APK size budget
        run: |
          apk=$(find app/build/outputs/apk/release -name '*.apk' -print -quit)
          test -n "$apk"
          bytes=$(stat -c%s "$apk")
          echo "Release APK: $bytes bytes"
          test "$bytes" -le 41943040
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-quality-reports
          path: |
            app/build/reports/
            app/build/outputs/apk/debug/
            app/build/outputs/apk/release/
            app/build/outputs/apk/androidTest/
            app/schemas/

  connected-instrumentation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Source quality gate
        run: python3 tools/source_quality_gate.py
      - name: Android 15 emulator UI, migration and accessibility tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: ./gradlew --no-daemon connectedDebugAndroidTest
      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-reports
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
